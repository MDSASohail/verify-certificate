<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    iframe {
      width: 90vw;
      height: 95vh;
      border: none;
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>
  <iframe src="./certificate.pdf#toolbar=0&navpanes=0&scrollbar=0" title="PDF Viewer"></iframe>
</body>
</html>
